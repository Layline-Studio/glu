name: glu
description: Glu mobile app scaffold
publish_to: 'none'
version: 1.6.1+20

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.3.0
  flutter_slidable: ^4.0.3
  google_fonts: ^8.1.0
  gap: ^3.0.1
  flutter_lucide: 1.11.0
  showcaseview: ^5.1.0
  uuid: ^4.2.2
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  permission_handler: ^12.0.3
  http: ^1.2.1
  flutter_svg: ^2.3.0
  flutter_markdown: ^0.7.5
  file_picker: ^11.0.2
  image_picker: ^1.2.3
  pdfx: ^2.6.0
  path_provider: ^2.1.6
  sqflite: ^2.4.2
  connectivity_plus: ^7.2.0
  device_info_plus: ^12.4.0
  package_info_plus: ^9.0.1
  wakelock_plus: ^1.5.2
  crypto: ^3.0.7
  supabase_flutter: ^2.16.0
  posthog_flutter: ^5.30.0
  firebase_analytics: ^12.4.3
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  go_router: ^17.3.0
  app_links: ^7.0.0
  url_launcher: ^6.2.5
  sign_in_with_apple: ^8.1.0
  google_sign_in: ^7.2.0
  in_app_review: ^2.0.12
  flutter_local_notifications: ^22.0.1
  flutter_timezone: ^5.1.0
  timezone: ^0.11.1
  purchases_flutter: ^10.4.0
  purchases_ui_flutter: ^10.4.0
  ruler_scale_picker: ^1.0.0
  syncfusion_flutter_gauges: ^34.1.29
  record: ^6.2.1
  gal: ^2.3.2
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.15.0

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: 'assets/icons/app_icon.png'
    background_color: '#E9EDF3'
    theme_color: '#E9EDF3'
  image_path: 'assets/icons/app_icon.png'

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/images/reviewers/
  fonts:
    - family: SF Pro Display
      fonts:
        - asset: assets/fonts/SFPRODISPLAYREGULAR.OTF
          weight: 400
        - asset: assets/fonts/SFPRODISPLAYMEDIUM.OTF
          weight: 500
        - asset: assets/fonts/SFPRODISPLAYBOLD.OTF
          weight: 700
