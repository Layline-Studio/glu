name: glu
description: Glu mobile app scaffold
publish_to: 'none'
version: 1.4.2+17

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.3.0
  flutter_slidable: ^4.0.3
  google_fonts: ^8.0.0
  gap: ^3.0.1
  flutter_lucide: 1.8.2
  showcaseview: ^5.0.1
  uuid: ^4.2.2
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  permission_handler: ^12.0.1
  http: ^1.2.1
  flutter_svg: ^2.0.10
  flutter_markdown: ^0.7.5
  file_picker: ^11.0.2
  image_picker: ^1.2.1
  pdfx: ^2.6.0
  path_provider: ^2.1.5
  sqflite: ^2.4.2
  connectivity_plus: ^7.1.0
  device_info_plus: ^11.5.0
  package_info_plus: ^9.0.1
  wakelock_plus: ^1.2.11
  crypto: ^3.0.7
  supabase_flutter: ^2.5.1
  posthog_flutter: ^5.14.0
  firebase_analytics: ^12.0.1
  firebase_core: ^4.1.1
  firebase_messaging: ^16.1.3
  go_router: ^17.0.1
  app_links: ^7.0.0
  url_launcher: ^6.2.5
  sign_in_with_apple: ^7.0.1
  google_sign_in: ^7.2.0
  in_app_review: ^2.0.10
  flutter_local_notifications: ^21.0.0
  flutter_timezone: ^5.0.1
  timezone: ^0.11.0
  purchases_flutter: ^9.15.1
  purchases_ui_flutter: ^9.15.1
  ruler_scale_picker: ^1.0.0
  syncfusion_flutter_gauges: ^33.1.46
  record: ^6.1.1
  gal: ^2.3.2
  share_plus: ^10.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.0+1
  build_runner: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: 'assets/icons/app_icon.png'
    background_color: '#E9EDF3'
    theme_color: '#E9EDF3'
  image_path: 'assets/icons/app_icon.png'

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/images/reviewers/
  fonts:
    - family: SF Pro Display
      fonts:
        - asset: assets/fonts/SFPRODISPLAYREGULAR.OTF
          weight: 400
        - asset: assets/fonts/SFPRODISPLAYMEDIUM.OTF
          weight: 500
        - asset: assets/fonts/SFPRODISPLAYBOLD.OTF
          weight: 700
